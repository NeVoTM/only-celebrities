services:
  - type: web
    name: only-celebrities
    runtime: static
    buildCommand: "echo No build step needed for static site"
    staticPublishPath: .
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
